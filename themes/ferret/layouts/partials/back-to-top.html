<a class="site-back-to-top" href="#top" aria-label="Back to top" title="Back to top" data-pagefind-ignore="all">
    <span class="site-back-to-top-icon" aria-hidden="true"></span>
</a>

<script>
    (function() {
        const button = document.querySelector(".site-back-to-top");
        const header = document.getElementById("site-header");

        if (!button) {
            return;
        }

        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
        let ticking = false;

        function setVisible(isVisible) {
            button.classList.toggle("is-visible", isVisible);

            if (isVisible) {
                button.removeAttribute("aria-hidden");
                button.removeAttribute("tabindex");
            } else {
                button.setAttribute("aria-hidden", "true");
                button.setAttribute("tabindex", "-1");
            }
        }

        function updateVisibility() {
            setVisible(window.scrollY > window.innerHeight);
            ticking = false;
        }

        function requestVisibilityUpdate() {
            if (ticking) {
                return;
            }

            ticking = true;
            window.requestAnimationFrame(updateVisibility);
        }

        function focusHeader() {
            if (!header) {
                return;
            }

            try {
                header.focus({ preventScroll: true });
            } catch (error) {
                header.focus();
            }
        }

        button.classList.add("is-enhanced");
        updateVisibility();

        window.addEventListener("scroll", requestVisibilityUpdate, { passive: true });
        window.addEventListener("resize", requestVisibilityUpdate);

        button.addEventListener("click", function(event) {
            event.preventDefault();

            window.scrollTo({
                top: 0,
                behavior: reducedMotion.matches ? "auto" : "smooth"
            });

            window.setTimeout(focusHeader, reducedMotion.matches ? 0 : 350);
        });
    })();
</script>
