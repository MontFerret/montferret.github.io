{{- $isSearch := eq .RelPermalink "/search/" -}}
<aside class="docs-sidebar" aria-label="Docs navigation" data-pagefind-ignore="all">
    <a class="docs-search-button{{ if $isSearch }} is-active{{ end }}" href="/search/"{{ if $isSearch }} aria-current="page"{{ end }}>
        <span>Search docs</span>
        <kbd aria-hidden="true">/</kbd>
    </a>

    {{ partial "toc.html" (dict "Dir" "/docs" "Page" .) }}
</aside>
