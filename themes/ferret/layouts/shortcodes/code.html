{{ $id := printf "code-%d" .Ordinal }}
{{ $lang := default "fql" ( .Get "lang" )}}

{{- if eq $lang "aql" -}}
{{ $lang = "fql" }}
{{- end -}}
{{ $height := default "400px" ( .Get "height" )}}
{{ $width := default "100%" ( .Get "height" ) }}

<div class="code-editor is-readonly">
    <div class="code-editor-shell">
        <div class="code-editor-header">
            <div class="code-editor-title">
                <span class="code-editor-dot" aria-hidden="true"></span>
                <span>example.{{ $lang }}</span>
            </div>
            <span class="code-editor-meta">read-only</span>
        </div>

        <div class="code-editor-pane">
            <div id="{{ $id }}-text" class="code-editor-text" style="height: {{ $height }};">
{{ .Inner }}
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const editor = ace.edit('{{ $id }}-text');
            editor.setTheme("{{ hugo.Data.repl.theme }}");
            editor.session.setUseWorker(false);
            editor.session.setMode("ace/mode/" + '{{ $lang }}');
            editor.setOptions({
                readOnly: true,
                highlightActiveLine: false,
                highlightGutterLine: false,
                displayIndentGuides: false,
                printMargin: false
            });
            editor.renderer.$cursorLayer.element.style.display = "none"
        }, false);
    </script>
</div>
