tiles:
    getting-started-overview:
        page: docs/getting-started/overview
        kicker: Explore
        title: What Is Ferret?
        description: Learn what Ferret is, how it works, and where it fits.
    
    getting-started-installation:
        page: docs/getting-started/installation
        kicker: Setup
        title: Install Ferret
        description: Install the CLI or add Ferret to a Go application.
    
    getting-started-quick-start:
        page: docs/getting-started/quick-start
        kicker: Try
        title: Run your first script
        description: Execute a Ferret script against static or dynamic content.
    
    language:
        page: docs/language
        kicker: Learn
        title: Learn the language basics
        description: Understand variables, expressions, collections, control flow, and functions.
        
    language-structure:
        page: docs/language/script-structure
        kicker: Learn
        title: Script structure
        description: Learn about the structure of Ferret scripts.
        
    language-types:
        page: docs/language/types
        kicker: Learn
        title: Values and Types
        description: "Understand how FQL values work, from basic data types to host values and runtime capabilities."
    
    language-types-basic:
        page: docs/language/types/basic
        kicker: Learn
        title: Basic Types
        description: "Learn the built-in value types: NONE, booleans, numbers, strings, arrays, objects, and binary values."
    
    language-types-host:
        page: docs/language/types/host
        kicker: Learn
        title: Host Values
        description: "Understand values provided by modules, runtimes, and embedded hosts, such as database connections, browser pages, files, and other external resources."
    
    language-types-capabilities:
        page: docs/language/types/capabilities
        kicker: Learn
        title: Value Capabilities
        description: "Learn how values expose behavior such as property access, iteration, querying, dispatch, and serialization."
        
    language-types-serialization:
        page: docs/language/types/serialization
        kicker: Learn
        title: Value Serialization
        description: "Learn how values are serialized and deserialized, including JSON and binary formats."
    
    language-types-ordering:
        page: docs/language/types/ordering
        kicker: Learn
        title: Type Ordering
        description: "Learn how FQL compares and sorts values, including values of different types."
        
    language-variables:
        page: docs/language/variables
        kicker: Learn
        title: Variables
        description: Learn about variables, the main building block of FQL.
        
    language-expressions:
        page: docs/language/expressions
        kicker: Learn
        title: Expressions
        description: Learn about expressions, the main building block of FQL.

    language-operators-comparison:
        page: docs/language/operators/comparison
        kicker: Learn
        title: Comparison Operators
        description: "Equality, ordering, containment, pattern matching, and regular expression comparison operators."

    language-operators-logical:
        page: docs/language/operators/logical
        kicker: Learn
        title: Logical Operators
        description: "Logical AND, OR, NOT operators with short-circuit evaluation and boolean conversion."

    language-operators-arithmetic:
        page: docs/language/operators/arithmetic
        kicker: Learn
        title: Arithmetic Operators
        description: "Addition, subtraction, multiplication, division, modulus, and type conversion rules."

    language-operators-range:
        page: docs/language/operators/range
        kicker: Learn
        title: Range Operator
        description: "The range operator for producing sequences of integer values."

    language-operators-ternary:
        page: docs/language/operators/ternary
        kicker: Learn
        title: Ternary Operator
        description: "Conditional evaluation with the ternary operator and its shortcut form."

    language-operators-array:
        page: docs/language/operators/array
        kicker: Learn
        title: Array Operators
        description: "Array expansion, flattening, inline expressions, the question mark operator, and array comparison operators."

    language-operators-precedence:
        page: docs/language/operators/precedence
        kicker: Learn
        title: Operator Precedence
        description: "The evaluation order of FQL operators, from lowest to highest precedence."
    
    stdlib:
        page: docs/standard-library
        kicker: Learn
        title: Standard library
        description: Learn about the standard library, a collection of functions and types that are available to all Ferret scripts.
    
    web-extraction:
        page: docs/web-extraction
        kicker: Extract
        title: Query document data
        description: Work with HTML, XML, JSON, and other document-like data.
    
    dynamic-pages:
        url: /docs/dynamic-pages/
        kicker: Browse
        title: Work with dynamic pages
        description: Wait for content, react to page state, and automate browser interactions.
    
    tools-lab:
        page: docs/tools/lab
        kicker: Test
        title: Use Lab
        description: Run Ferret test suites against local, HTTP, and browser-backed runtimes.
    
    tools-cli:
        page: docs/tools/cli
        kicker: Command line
        title: Use the CLI
        description: Run Ferret from your terminal, scripts, and automation jobs.
        
    tools-worker:
        page: docs/tools/worker
        kicker: Deploy
        title: Run Ferret Worker
        description: Deploy Ferret as a long-running service for remote execution and automation workflows.
    
    embedding:
        page: docs/embedding
        kicker: Go library
        title: Embed Ferret in Go
        description: Add Ferret to your application and register the capabilities you need.
    
    browser-runtime:
        url: /docs/browser/
        kicker: Browser runtime
        title: Automate browsers
        description: Connect Ferret to Chrome or Chromium for browser-backed workflows.
    
    html-querying:
        url: /docs/html/
        kicker: Web module
        title: Query HTML
        description: Extract structured data from HTML documents using query capabilities.
    
    javascript-rendering:
        url: /docs/javascript-rendering/
        kicker: Dynamic pages
        title: Handle JavaScript-rendered content
        description: Work with pages that load content through scripts, network requests, or user interactions.
    
    custom-modules:
        url: /docs/modules/custom/
        kicker: Extensibility
        title: Integrate custom modules
        description: Extend Ferret with custom functions, capabilities, and runtime integrations.
    
    reference:
        page: docs/reference
        kicker: Look up
        title: Language reference
        description: Find details on language features, built-in functions, modules, and runtime behavior.
