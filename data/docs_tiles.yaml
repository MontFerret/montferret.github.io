tiles:
    getting-started-overview:
        page: docs/getting-started/overview
        kicker: Explore
        title: What Is Ferret?
        description: Learn what Ferret is, how it works, and where it fits.
    
    getting-started-installation:
        page: docs/getting-started/installation
        kicker: Setup
        title: Install Ferret
        description: Get the CLI, or add Ferret to a Go application.
    
    getting-started-quick-start:
        page: docs/getting-started/quick-start
        kicker: Try
        title: Run your first script
        description: Execute a Ferret script against static or dynamic content.
    
    language:
        page: docs/language
        kicker: Learn
        title: Learn the language basics
        description: Understand variables, expressions, collections, control flow, and functions.
    
    language-overview:
        page: docs/language/overview
        kicker: Learn
        title: Overview
        description: "See the high-level shape of a Ferret program."
    
    language-structure:
        page: docs/language/script-structure
        kicker: Learn
        title: Script structure
        description: How a Ferret script is organized, top to bottom.
    
    language-types:
        page: docs/language/types
        kicker: Learn
        title: Values and Types
        description: "Understand how FQL values work, from basic data types to host values and runtime capabilities."
    
    language-types-basic:
        page: docs/language/types/basic
        kicker: Learn
        title: Basic Types
        description: "Learn the built-in value types: NONE, booleans, numbers, strings, arrays, objects, and binary values."
    
    language-types-host:
        page: docs/language/types/host
        kicker: Learn
        title: Host Values
        description: "Values from modules, runtimes, and hosts: connections, pages, files, and more."
    
    language-types-capabilities:
        page: docs/language/types/capabilities
        kicker: Learn
        title: Capability Types
        description: "Learn how values expose behavior such as property access, iteration, querying, dispatch, and serialization."
    
    language-types-serialization:
        page: docs/language/types/serialization
        kicker: Learn
        title: Value Serialization
        description: "Learn how values are serialized and deserialized, including JSON and binary formats."
    
    language-types-ordering:
        page: docs/language/types/ordering
        kicker: Learn
        title: Type Ordering
        description: "Learn how FQL compares and sorts values, including values of different types."
    
    language-variables:
        page: docs/language/variables
        kicker: Learn
        title: Variables
        description: Name a value once and reuse it throughout your script.
    
    language-expressions:
        page: docs/language/expressions
        kicker: Learn
        title: Expressions
        description: Build values from literals, operators, and function calls.

    language-operators:
        page: docs/language/operators
        kicker: Learn
        title: Operators
        description: "Compare, combine, and transform values with FQL's operators."

    language-operators-comparison:
        page: docs/language/operators/comparison
        kicker: Learn
        title: Comparison Operators
        description: "Equality, ordering, containment, pattern matching, and regular expression comparison operators."

    language-operators-logical:
        page: docs/language/operators/logical
        kicker: Learn
        title: Logical Operators
        description: "Logical AND, OR, NOT operators with short-circuit evaluation and boolean conversion."

    language-operators-arithmetic:
        page: docs/language/operators/arithmetic
        kicker: Learn
        title: Arithmetic Operators
        description: "Addition, subtraction, multiplication, division, modulus, and type conversion rules."

    language-operators-range:
        page: docs/language/operators/range
        kicker: Learn
        title: Range Operator
        description: "The range operator for producing sequences of integer values."

    language-operators-ternary:
        page: docs/language/operators/ternary
        kicker: Learn
        title: Ternary Operator
        description: "Conditional evaluation with the ternary operator and its shortcut form."

    language-operators-array:
        page: docs/language/operators/array
        kicker: Learn
        title: Array Operators
        description: "Array expansion, flattening, inline expressions, the question mark operator, and array comparison operators."

    language-operators-precedence:
        page: docs/language/operators/precedence
        kicker: Learn
        title: Operator Precedence
        description: "The evaluation order of FQL operators, from lowest to highest precedence."

    language-functions:
        page: docs/language/functions
        kicker: Learn
        title: Functions
        description: "Call built-in functions, write your own, and use modules."

    language-functions-user-defined:
        page: docs/language/functions/user-defined
        kicker: Learn
        title: User-Defined Functions
        description: "Declare reusable functions within a script using the FUNC keyword."

    language-functions-modules:
        page: docs/language/functions/modules
        kicker: Learn
        title: Module Functions
        description: "Call namespaced functions and create aliases with the USE statement."

    language-control-flow:
        page: docs/language/control-flow
        kicker: Learn
        title: Control Flow
        description: "Control the flow of your script with conditional statements, loops, and subqueries."

    language-control-flow-match:
        page: docs/language/control-flow/match
        kicker: Learn
        title: Match Expressions
        description: "Select a value by matching against patterns or conditions with the MATCH expression."

    language-control-flow-for:
        page: docs/language/control-flow/for
        kicker: Learn
        title: For Loops
        description: "Iterate over collections and ranges, and shape results with FILTER, SORT, LIMIT, and COLLECT."

    language-control-flow-subqueries:
        page: docs/language/control-flow/subqueries
        kicker: Learn
        title: Subquery Expressions
        description: "Use a parenthesized FOR block as a value to compose and nest transformations."

    language-control-flow-query:
        page: docs/language/control-flow/query
        kicker: Learn
        title: Query Expressions
        description: "Delegate a query to a host value with QUERY ... IN ... USING ..."

    language-control-flow-dispatch:
        page: docs/language/control-flow/dispatch
        kicker: Learn
        title: Dispatch Expressions
        description: "Emit an event to a host value with DISPATCH and its arrow shorthand."

    language-control-flow-waitfor:
        page: docs/language/control-flow/waitfor
        kicker: Learn
        title: Waitfor Expressions
        description: "Suspend evaluation until a condition becomes true or an event arrives."

    stdlib:
        page: docs/standard-library
        kicker: Learn
        title: Standard library
        description: Functions and types available to every Ferret script.
    
    web-extraction:
        page: docs/web-extraction
        kicker: Extract
        title: Query document data
        description: Work with HTML, XML, JSON, and other document-like data.
    
    dynamic-pages:
