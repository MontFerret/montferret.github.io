startingPoints:
  - title: "Quick start"
    eyebrow: "Docs"
    description: "Run your first FQL script, fetch a page, select elements, and return structured data."
    url: "/docs/getting-started/"
    action: "Start with docs"
  - title: "Install locally"
    eyebrow: "CLI"
    description: "Use Ferret from a terminal, script, or CI job with the command-line tooling."
    url: "/docs/installation/"
    action: "Install Ferret"
  - title: "Try in browser"
    eyebrow: "Playground"
    description: "Experiment with Ferret v2 syntax and browser-backed examples without local setup."
    url: "/try/next/"
    action: "Open playground"

ecosystem:
  - name: "Ferret Runtime"
    badge: "Core"
    description: "The declarative language, compiler, standard library, and execution engine for FQL programs."
    url: "https://github.com/MontFerret/ferret"
    action: "Runtime repo"
  - name: "Contrib"
    badge: "Extensions"
    featured: true
    description: "Official extension modules and integrations, including browser and HTML capabilities that stay outside the core runtime."
    url: "https://github.com/MontFerret/contrib"
    action: "Explore Contrib"
  - name: "CLI"
    badge: "Local tooling"
    description: "Command-line tooling for running scripts locally, testing ideas, and wiring Ferret into shell workflows."
    url: "https://github.com/MontFerret/cli"
    action: "CLI repo"
  - name: "Worker"
    badge: "Remote execution"
    description: "An HTTP service for executing Ferret scripts remotely from applications, jobs, or distributed environments."
    url: "https://github.com/MontFerret/worker"
    action: "Worker repo"
  - name: "Lab"
    badge: "Testing"
    description: "A test runner for Ferret-powered UI and workflow checks, built for repeatable browser scenarios."
    url: "https://github.com/MontFerret/lab"
    action: "Lab repo"
  - name: "Chromium"
    badge: "Execution image"
    description: "A Dockerized Chromium environment for browser-backed extraction and automation via CDP."
    url: "https://hub.docker.com/r/montferret/chromium/tags"
    action: "Docker image"
  - name: "VS Code syntax highlighting"
    badge: "Editor support"
    description: "Syntax highlighting for FQL scripts while editing extraction workflows in VS Code."
  - name: "Playground"
    badge: "Browser IDE"
    description: "A browser-based environment for trying FQL examples and sharing focused experiments."
    url: "/try/next/"
    action: "Try Ferret"

positioning:
  - title: "Declarative extraction"
    description: "Describe the data shape, filters, waits, and transformations directly in FQL instead of spreading extraction logic through glue code."
  - title: "Browser automation when needed"
    description: "Run against static HTML for simple pages or switch to a real Chromium session through CDP for JavaScript-rendered workflows."
  - title: "Embeddable runtime"
    description: "Use Ferret as a Go runtime when extraction logic belongs inside an application, service, or internal tool."
  - title: "Core plus modules"
    description: "Keep the language and runtime focused while Contrib and host applications provide domain-specific capabilities."

learnMore:
  - title: "Documentation"
    description: "Language, installation, standard library, and workflow guides."
    url: "/docs/introduction/"
  - title: "Blog"
    description: "Release notes and design notes for Ferret v2 and the surrounding tools."
    url: "/blog/"
  - title: "Ferret repository"
    description: "Core runtime source, issues, and releases."
    url: "https://github.com/MontFerret/ferret"
  - title: "MontFerret on GitHub"
    description: "The wider ecosystem of official repositories."
    url: "https://github.com/MontFerret"
