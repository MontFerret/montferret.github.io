workflow:
  - title: "Describe in FQL"
    icon: "FQL"
    description: "Model selectors, waits, filters, transformations, and output shape in one declarative query."
  - title: "Execute against HTML or CDP"
    icon: "CDP"
    description: "Run the same workflow against static documents or JavaScript-rendered pages through Chromium."
  - title: "Return structured data"
    icon: "JSON"
    description: "Produce predictable objects and arrays that are ready for scripts, tests, services, or jobs."
  - title: "Reuse across tools"
    icon: "RUN"
    description: "Move from Playground to CLI, Go embedding, Worker, or Lab without changing the language."

startingPoints:
  - title: "Try in browser"
    eyebrow: "Primary path"
    icon: "TRY"
    featured: true
    description: "Open the Ferret v2 playground and run browser-backed examples without installing anything."
    url: "/try/next/"
    action: "Open playground"
  - title: "Install CLI"
    eyebrow: "Local path"
    icon: "CLI"
    description: "Run FQL from a terminal, script, or CI job when experiments need local files and repeatable commands."
    url: "/docs/installation/"
    action: "Install locally"
  - title: "Embed or run remotely"
    eyebrow: "Production path"
    icon: "HTTP"
    description: "Use the Go runtime or Worker HTTP service when extraction belongs inside applications and jobs."
    url: "https://github.com/MontFerret/worker"
    action: "Review Worker"

ecosystem:
  - name: "Ferret Runtime"
    badge: "Core runtime"
    group: "Foundation"
    size: "foundation"
    icon: "FQL"
    description: "The declarative language, compiler, standard library, and execution engine for FQL programs."
    url: "https://github.com/MontFerret/ferret"
    action: "Runtime repo"
  - name: "Contrib"
    badge: "Official extensions"
    group: "Foundation"
    size: "foundation"
    icon: "EXT"
    featured: true
    description: "Extension modules and integrations, including browser and HTML capabilities that stay outside the core runtime."
    url: "https://github.com/MontFerret/contrib"
    action: "Explore Contrib"
  - name: "CLI"
    badge: "Local tooling"
    group: "Development"
    size: "component"
    icon: "CLI"
    description: "Command-line tooling for running scripts locally, testing ideas, and wiring Ferret into shell workflows."
    url: "https://github.com/MontFerret/cli"
    action: "CLI repo"
  - name: "Playground"
    badge: "Browser IDE"
    group: "Development"
    size: "component"
    icon: "TRY"
    description: "A browser-based environment for trying FQL examples and sharing focused experiments."
    url: "/try/next/"
    action: "Try Ferret"
  - name: "Worker"
    badge: "Remote execution"
    group: "Execution"
    size: "component"
    icon: "HTTP"
    description: "An HTTP service for executing Ferret scripts remotely from applications, jobs, or distributed environments."
    url: "https://github.com/MontFerret/worker"
    action: "Worker repo"
  - name: "Chromium"
    badge: "Execution image"
    group: "Execution"
    size: "component"
    icon: "CDP"
    description: "A Dockerized Chromium environment for browser-backed extraction and automation through CDP."
    url: "https://hub.docker.com/r/montferret/chromium/tags"
    action: "Docker image"
  - name: "Lab"
    badge: "Testing"
    group: "Quality"
    size: "component"
    icon: "LAB"
    description: "A test runner for Ferret-powered UI and workflow checks, built for repeatable browser scenarios."
    url: "https://github.com/MontFerret/lab"
    action: "Lab repo"
  - name: "VS Code syntax highlighting"
    badge: "Editor support"
    group: "Quality"
    size: "component"
    icon: "VS"
    description: "Syntax highlighting for FQL scripts while editing extraction workflows in VS Code."

positioning:
  - title: "Declarative workflows"
    icon: "FQL"
    description: "Describe what to collect, how to wait, and which shape to return without scattering extraction logic through browser glue code."
  - title: "Browser automation through CDP"
    icon: "CDP"
    description: "Use static HTML for simple pages and switch to a real Chromium session when JavaScript-rendered states matter."
  - title: "Embeddable Go runtime"
    icon: "Go"
    description: "Run FQL where your application already lives, with host-provided modules and controlled execution boundaries."
  - title: "Core plus optional modules"
    icon: "MOD"
    description: "Keep the runtime focused while Contrib and host applications provide integrations for specific environments."

learnMore:
  - title: "Documentation"
    icon: "DOC"
    description: "Language, installation, standard library, and workflow guides."
    url: "/docs/introduction/"
  - title: "Blog"
    icon: "LOG"
    description: "Release notes and design notes for Ferret v2 and the surrounding tools."
    url: "/blog/"
  - title: "Ferret repository"
    icon: "SRC"
    description: "Core runtime source, issues, and releases."
    url: "https://github.com/MontFerret/ferret"
  - title: "MontFerret on GitHub"
    icon: "ORG"
    description: "The wider ecosystem of official repositories."
    url: "https://github.com/MontFerret"
