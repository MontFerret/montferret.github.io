workflow:
  - title: "Describe in FQL"
    icon: "FQL"
    description: "Define the data you need, the conditions to wait for, and the final shape to return."
  - title: "Execute where data lives"
    icon: "RUN"
    description: "Run the same program against static documents, browser-rendered pages, APIs, or host-provided data sources."
  - title: "Return structured data"
    icon: "JSON"
    description: "Produce predictable objects and arrays that are ready for scripts, tests, services, or jobs."
  - title: "Reuse across tools"
    icon: "RUN"
    description: "Move from Playground to CLI, Go embedding, Worker, or Lab without changing the language."

startingPoints:
  - title: "Try in browser"
    eyebrow: "Primary path"
    icon: "TRY"
    featured: true
    description: "Open the Ferret v2 playground and run examples without installing anything."
    url: "/try/next/"
    action: "Open playground"
  - title: "Install CLI"
    eyebrow: "Local path"
    icon: "CLI"
    description: "Run FQL from your terminal, automate repeatable tasks, and work with local files."
    url: "/docs/installation/"
    action: "Install locally"
  - title: "Embed or run remotely"
    eyebrow: "Production path"
    icon: "HTTP"
    description: "Use the Go runtime or Worker HTTP service when Ferret belongs inside applications, jobs, or internal tools."
    url: "https://github.com/MontFerret/worker"
    action: "Review Worker"

ecosystem:
  - name: "Ferret Runtime"
    badge: "Core runtime"
    group: "Core"
    category: "Core"
    size: "foundation"
    icon: "FQL"
    featured: true
    description: "The declarative language, compiler, standard library, and execution engine for FQL programs."
    url: "https://github.com/MontFerret/ferret"
    action: "Runtime repo"
  - name: "Chromium"
    badge: "Execution image"
    group: "Execution"
    category: "Execution"
    size: "component"
    icon: "CDP"
    description: "A Dockerized Chromium environment for browser-backed extraction and automation through CDP."
